version: "3.9"

services:
# ================================
# ORACLE DATABASE
# ================================
  oracle-db:
    image: gvenzl/oracle-xe:latest
    container_name: fraud-oracle

    ports:
      - "1521:1521"

    environment:
      ORACLE_USER: system
      ORACLE_PASSWORD: oracle

    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./oracle/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - fraud-network

    mem_limit: 2g


# ================================
# KAFKA (KRaft Mode - No Zookeeper)
# ================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: fraud-kafka
    hostname: kafka
    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    volumes:
      - kafka_data:/var/lib/kafka/data

    networks:
      - fraud-network

    mem_limit: 1g


# ================================
# APACHE NIFI
# ================================
  nifi:
    image: apache/nifi:1.25.0
    container_name: fraud-nifi

    ports:
      - "8081:8080"

    environment:
      NIFI_WEB_HTTP_PORT: 8080
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: admin123

    volumes:
      - nifi_state:/opt/nifi/nifi-current/state
      - nifi_database:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository

    networks:
      - fraud-network

    mem_limit: 2g

# ================================
# SPARK MASTER
# ================================
  spark-master:
    image: apache/spark:3.5.1
    container_name: fraud-spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master

    ports:
      - "7077:7077"
      - "8080:8080"

    networks:
      - fraud-network

    mem_limit: 1g

# ================================
# SPARK WORKER 1
# ================================
  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: fraud-spark-worker-1

    depends_on:
      - spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker spark://spark-master:7077

    environment:
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: 2

    networks:
      - fraud-network

    mem_limit: 1g

# ================================
# SPARK WORKER 2
# ================================
  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: fraud-spark-worker-2

    depends_on:
      - spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker spark://spark-master:7077

    environment:
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: 2

    networks:
      - fraud-network

    mem_limit: 1g

# ================================
# HADOOP NAMENODE
# ================================
  hadoop-namenode:
    image: apache/hadoop:3.3.6
    container_name: fraud-namenode
    hostname: fraud-namenode
    user: root

    command: >
      bash -c "
      mkdir -p /hadoop/dfs/name /hadoop/dfs/data &&
      if [ ! -d /hadoop/dfs/name/current ]; then
          echo 'Formatting HDFS NameNode...'
          hdfs namenode -format -force -nonInteractive
      fi &&
      echo 'Starting HDFS NameNode...' &&
      hdfs namenode
      "

    ports:
      - "9870:9870"

    volumes:
      - ./hadoop-config:/opt/hadoop/etc/hadoop
      - hadoop_name:/hadoop/dfs

    networks:
      - fraud-network

    mem_limit: 1g

# ================================
# HADOOP DATANODE
# ================================
  hadoop-datanode-1:
    image: apache/hadoop:3.3.6
    container_name: fraud-datanode-1
    hostname: fraud-datanode-1
    user: root

    command: >
      bash -c "
      mkdir -p /hadoop/dfs/data &&
      hdfs datanode
      "
      
    depends_on:
      - hadoop-namenode

    volumes:
      - ./hadoop-config:/opt/hadoop/etc/hadoop
      - hadoop_data_1:/hadoop/dfs

    networks:
      - fraud-network

    mem_limit: 1g

  hadoop-datanode-2:
    image: apache/hadoop:3.3.6
    container_name: fraud-datanode-2
    hostname: fraud-datanode-2
    user: root

    command: >
      bash -c "
      mkdir -p /hadoop/dfs/data &&
      hdfs datanode
      "
      
    depends_on:
      - hadoop-namenode

    volumes:
      - ./hadoop-config:/opt/hadoop/etc/hadoop
      - hadoop_data_2:/hadoop/dfs

    networks:
      - fraud-network

    mem_limit: 1g

# ================================
# YARN RESOURCE MANAGER
# ================================
  resourcemanager:
    image: apache/hadoop:3.3.6
    container_name: fraud-resourcemanager
    hostname: fraud-resourcemanager
    user: root

    command: ["yarn", "resourcemanager"]

    volumes:
      - ./hadoop-config:/opt/hadoop/etc/hadoop

    ports:
      - "8088:8088"
      - "8032:8032"

    networks:
      - fraud-network

    mem_limit: 1g

# ================================
# YARN NODE MANAGER
# ================================
  nodemanager:
    image: apache/hadoop:3.3.6
    container_name: fraud-nodemanager
    hostname: fraud-nodemanager
    user: root

    command: ["yarn", "nodemanager"]

    volumes:
      - ./hadoop-config:/opt/hadoop/etc/hadoop


    depends_on:
      - resourcemanager

    networks:
      - fraud-network

    mem_limit: 1g
  simulator:
    build: ../data-simulator
    container_name: txn-simulator
    image: data-simulator
    depends_on:
      - oracle-db
    networks:
      - fraud-network

# ================================
# NETWORK
# ================================
networks:
  fraud-network:
    driver: bridge

# ================================
# VOLUMES
# ================================
volumes:
  oracle_data:
  kafka_data:
  nifi_state:
  nifi_database:
  nifi_flowfile:
  nifi_content:
  hadoop_name:
  hadoop_data_1:
  hadoop_data_2: